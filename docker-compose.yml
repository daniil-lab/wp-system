version: "3.9"  # optional since v1.27.0
services:
  nginx:
    container_name: nginx
    image: nginx
    networks:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./www:/var/www
      - ./logs/nginx:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - web

  web:
    image: "docker.pkg.github.com/daniil-lab/wp-system/wp-system:main"
    ports:
      - "8080:8080"
    expose:
      - "8080"
    networks:
      - backend
    volumes:
      - ~/images:/images
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/wp
      - SENDPULSE_CLIENT_ID=d9bdd184a2a4a14b830a8b264ce33f31
      - SENDPULSE_CLIENT_SECRET=e6a25e4d987db74d7e63543d9ca429c1
    depends_on:
      - database

  database:
    image: "postgres"
    networks:
      - backend
    env_file:
      - database.env
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

networks:
  backend:
    driver: bridge
