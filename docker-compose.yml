version: "3.9"  # optional since v1.27.0
services:
  web:
    image: test2
    networks:
      - backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/wp
    depends_on:
      - database

  database:
    image: "postgres"
    networks:
      - backend
    env_file:
      - database.env
    ports:
      - "5432:5432"

networks:
  backend:
    driver: bridge
