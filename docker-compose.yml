version: "3.9"  # optional since v1.27.0
services:
  web:
    build: ./
    network_mode: default
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/wp
    depends_on:
      - database

  database:
    image: "postgres"
    network_mode: default
    env_file:
      - database.env
    ports:
      - "5432:5432"


volumes:
  logvolume01: {}